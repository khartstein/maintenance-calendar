{% extends "base.html" %}
{% block title %}Sign in - Maintenance Calendar{% endblock %}
{% block content %}
<h2>Sign in</h2>
<p>Enter your email and we'll send you a magic sign-in link.</p>
<form hx-post="/auth/request" hx-target="#auth-result" hx-swap="innerHTML">
  <label for="email">Email</label>
  <input id="email" name="email" type="email" required autocomplete="email" />
  <button type="submit">Send link</button>
</form>
<div id="auth-result" role="status" aria-live="polite"></div>
{% endblock %}
