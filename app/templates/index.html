{% extends "base.html" %}
{% block content %}
{% if user is none %}
  <h2>Welcome</h2>
  <p>Sign in to add household items and get a maintenance schedule you can subscribe to.</p>
  <p><a class="btn" href="/auth/login">Sign in</a></p>
{% else %}
  <div class="page-header">
    <h2>Your items</h2>
    <nav class="actions">
      <a class="btn" href="/items/new">Add item</a>
      <a class="btn-link" href="/settings">Settings</a>
    </nav>
  </div>
  {% include "items/_list.html" %}
{% endif %}
{% endblock %}
