name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: install
        run: pip install -e ".[dev]"
      - name: ruff
        run: ruff check .
      - name: mypy
        run: mypy app
      - name: pytest
        run: pytest
